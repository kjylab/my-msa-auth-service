name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.11.1'

      - name: Build with Gradle
        run: gradle :auth-service:bootJar

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        if: github.ref == 'refs/heads/main'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=

      - name: Build and push image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Update manifest values
        if: github.ref == 'refs/heads/main'
        run: |
          IMAGE_TAG=$(echo "${{ github.sha }}" | cut -c1-7)
          git clone https://kjylab:${{ secrets.MANIFEST_TOKEN }}@github.com/kjylab/my-msa-manifest-values.git
          cd my-msa-manifest-values
          sed -i "s|tag:.*|tag: ${IMAGE_TAG}|" auth-service/values-release.yaml
          git config user.email "ci@ktcloud.black"
          git config user.name "CI Bot"
          git add auth-service/values-release.yaml
          git commit -m "chore: update auth-service image to ${IMAGE_TAG}"
          git push
