syntax = "proto3";

package dev.ktcloud.black.auth;

option java_package = "dev.ktcloud.black.auth.grpc";
option java_outer_classname = "AuthProto";
option java_multiple_files = true;

service AuthService {
  rpc CheckValidity (CheckValidityRequest) returns (CheckValidityResponse);
}

message CheckValidityRequest {
  string access_token = 1;
}

message CheckValidityResponse {
  string user_id = 1;
  string email = 2;
  string role = 3;
}
